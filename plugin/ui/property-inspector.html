<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Bluetooth Toggle</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 12px;
      color: #ccc;
      background: #2d2d2d;
      margin: 0;
      padding: 8px;
    }
    .sdpi-wrapper {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .sdpi-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    label {
      min-width: 80px;
      text-align: right;
      color: #999;
    }
    input[type="text"] {
      flex: 1;
      padding: 4px 8px;
      border: 1px solid #444;
      border-radius: 3px;
      background: #1a1a1a;
      color: #ccc;
      font-family: monospace;
      font-size: 12px;
    }
    input[type="text"]:focus,
    select:focus {
      outline: none;
      border-color: #0078d4;
    }
    select {
      flex: 1;
      padding: 4px 8px;
      border: 1px solid #444;
      border-radius: 3px;
      background: #1a1a1a;
      color: #ccc;
      font-size: 12px;
    }
    .hint {
      color: #666;
      font-size: 10px;
      margin-left: 88px;
    }
  </style>
</head>
<body>
  <div class="sdpi-wrapper">
    <div class="sdpi-item">
      <label for="macAddress">MAC Address</label>
      <input type="text" id="macAddress" placeholder="XX:XX:XX:XX:XX:XX" />
    </div>
    <div class="hint">
      Find in Windows: Settings &gt; Bluetooth &gt; Device &gt; Properties
    </div>
    <div class="sdpi-item">
      <label for="mode">Mode</label>
      <select id="mode">
        <option value="toggle">Toggle</option>
        <option value="connect">Connect only</option>
        <option value="disconnect">Disconnect only</option>
      </select>
    </div>
  </div>

  <script>
    // Stream Deck Property Inspector WebSocket connection
    let ws;
    let uuid;
    let actionInfo;

    function connectElgatoStreamDeckSocket(inPort, inUUID, inRegisterEvent, inInfo, inActionInfo) {
      uuid = inUUID;
      actionInfo = JSON.parse(inActionInfo);

      ws = new WebSocket(`ws://127.0.0.1:${inPort}`);

      ws.onopen = () => {
        ws.send(JSON.stringify({ event: inRegisterEvent, uuid: inUUID }));
        // Request current settings
        ws.send(JSON.stringify({ event: "getSettings", context: inUUID }));
      };

      ws.onmessage = (event) => {
        const msg = JSON.parse(event.data);
        if (msg.event === "didReceiveSettings") {
          loadSettings(msg.payload.settings || {});
        }
      };

      // Load existing settings from actionInfo
      loadSettings(actionInfo.payload.settings || {});
    }

    function loadSettings(settings) {
      if (settings.macAddress) {
        document.getElementById("macAddress").value = settings.macAddress;
      }
      if (settings.mode) {
        document.getElementById("mode").value = settings.mode;
      }
    }

    function saveSettings() {
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({
          event: "setSettings",
          context: uuid,
          payload: {
            macAddress: document.getElementById("macAddress").value.trim(),
            mode: document.getElementById("mode").value,
          }
        }));
      }
    }

    // Save settings when any input changes
    document.getElementById("macAddress").addEventListener("change", saveSettings);
    document.getElementById("mode").addEventListener("change", saveSettings);
  </script>
</body>
</html>
